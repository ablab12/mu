<!DOCTYPE html>
<html>
<head>
  <title>Random Song</title>
</head>
<body>
  <h1>Play Random Song</h1>

  <button onclick="playRandomSong()">
    Play
  </button>

  <audio id="player" controls></audio>

  <script>
    const songs = [
      "song1.mp3",
      "song2.mp3",
      "song3.mp3"
    ];

    function playRandomSong() {
      const randomSong =
        songs[Math.floor(Math.random() * songs.length)];

      const player =
        document.getElementById("player");

      player.src = randomSong;
      player.play();
    }
  </script>
</body>
</html>
