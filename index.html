<!DOCTYPE html>
<html>
<head>
  <title>Random Song Player</title>
</head>
<body>
  <h1>Random Song</h1>

  <audio id="player" controls autoplay></audio>

  <script>
    const songs = [
      "https://drive.google.com/file/d/1hyskcXFxJEEAwvH1JxVrM3m56IsOY8PC/view?usp=drive_link",
      "https://drive.google.com/file/d/1mDzjXGXy3ABsurTKGUJpPNl-LNOBFMsu/view?usp=drive_link",
	"https://drive.google.com/file/d/1u2pxdJSXud8v0Cg2m8nphfVIlr3JqZ7l/view?usp=drive_link",
	"https://drive.google.com/file/d/1_KCH7HxNz-XLDNsMVQPBUaHZnUo3thbC/view?usp=drive_link",
      "https://drive.google.com/file/d/1ZDJozzvLccyvfSPoxyihvhhFe0mqYCWg/view?usp=drive_link"
    ];

    const randomSong =
      songs[Math.floor(Math.random() * songs.length)];

    document.getElementById("player").src = randomSong;
  </script>
</body>
</html>
